server:
  port: 8888

spring:
  application:
    name: data-analysis
  datasource:
    driver-class-name: com.oceanbase.jdbc.Driver
    url: jdbc:oceanbase://localhost:2881/data_analysis
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 1000MB
  # Spring AI配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4
          temperature: 0.7

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: info
    sql: debug
    web: debug
    com.lowic.data.analysis: DEBUG
    com.baomidou.mybatisplus: DEBUG
